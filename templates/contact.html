{% extends "base.html" %}

{% block title %}联系我们 - 智能房屋租赁系统{% endblock %}

{% block content %}
<div class="container py-5">
    <h1 class="mb-4">联系我们</h1>

    <div class="row">
        <div class="col-md-8">
            <div class="card">
                <div class="card-body">
                    <h4 class="card-title mb-4">我们很乐意听到您的意见</h4>

                    <form>
                        <div class="mb-3">
                            <label class="form-label">姓名</label>
                            <input type="text" class="form-control" placeholder="请输入您的姓名">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">邮箱</label>
                            <input type="email" class="form-control" placeholder="请输入您的邮箱">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">主题</label>
                            <input type="text" class="form-control" placeholder="请输入反馈主题">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">内容</label>
                            <textarea class="form-control" rows="5" placeholder="请详细描述您的反馈内容"></textarea>
                        </div>

                        <button type="submit" class="btn btn-primary">提交反馈</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card mb-4">
                <div class="card-header bg-light">
                    <h5 class="mb-0">联系方式</h5>
                </div>
                <div class="card-body">
                    <p><strong>📧 邮箱</strong><br>support@rental.com</p>
                    <p><strong>📞 电话</strong><br>400-1234-5678</p>
                    <p><strong>🏢 地址</strong><br>中国，北京市朝阳区</p>
                    <p><strong>⏰ 工作时间</strong><br>周一至周五 9:00-18:00</p>
                </div>
            </div>

            <div class="card">
                <div class="card-header bg-light">
                    <h5 class="mb-0">关注我们</h5>
                </div>
                <div class="card-body">
                    <p>微博 • 微信 • 抖音</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
